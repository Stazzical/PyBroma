name: Release PyBroma

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.3), empty to skip publish'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
          - name: Linux
            os: ubuntu-latest
        python-version: ["3.12", "3.13", "3.14"]

    name: Build ${{ matrix.config.name }} for ${{ matrix.python-version }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install scikit-build cython wheel cmake ninja

      - name: Build
        run: pip wheel . --no-deps --wheel-dir dist

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pybroma-${{ matrix.config.name }}-${{ matrix.python-version }}
          path: dist/*.whl

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.version != '' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Resolve version tag
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*.whl