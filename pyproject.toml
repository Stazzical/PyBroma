[build-system]
requires = ["scikit-build-core>=1.0.0", "cython", "setuptools-scm"]
build-backend = "scikit_build_core.build"

[project]
name = "pybroma"
authors = [{ name = "Calloc" }]
maintainers = [
    { name = "prevter" },
    { name = "Stazzical" }
]
dynamic = ["version"]

[project.urls]
Repository = "https://github.com/prevter/PyBroma"
"Parent Project (BromaIDA)" = "https://github.com/Stazzical/BromaIDA"

[tool.scikit-build]
wheel.packages = ["pybroma"]
wheel.install-dir = "pybroma"
ninja.version = ">=1.11"
cmake.version = "CMakeLists.txt"
cmake.build-type = "Release"
sdist.exclude = [".github", ".gitignore"]

[[tool.dynamic-metadata]]
provider = "scikit_build_core.metadata.setuptools_scm"

# needed by setuptools_scm to activate lol
[tool.setuptools_scm]

[[tool.scikit-build.generate]]
path = "pybroma/_version.py"
template = '''
# Auto-generated by scikit-build-core from Git tags
__version__ = "${version}"
'''
